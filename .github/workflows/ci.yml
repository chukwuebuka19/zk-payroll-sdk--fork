name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/core

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: .
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
